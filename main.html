<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karthik Arumugam – Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 48px; border-bottom: 1px solid #1a1a1a; }
    nav .logo { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
    nav ul { list-style: none; display: flex; gap: 32px; }
    nav ul li a { color: #aaa; text-decoration: none; font-size: 14px; transition: color 0.2s; }
    nav ul li a:hover { color: #fff; }
    .hero { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 120px 24px; }
    .hero h1 { font-size: clamp(36px, 6vw, 72px); font-weight: 700; line-height: 1.1; margin-bottom: 20px; }
    .hero p { font-size: 18px; color: #aaa; max-width: 520px; line-height: 1.6; }
    footer { text-align: center; padding: 24px; color: #444; font-size: 13px; border-top: 1px solid #1a1a1a; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">KA</div>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  <section class="hero">
    <h1>Hi, I'm Karthik Arumugam</h1>
    <p>Developer &amp; designer building thoughtful digital experiences.</p>
  </section>
  <footer>&copy; 2026 Karthik Arumugam</footer>
</body>
</html>
